<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The magic Jen Jen left behind in every oracle deck</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #f7e8e8;
      --lavender: #e8e0f0;
      --mint: #dff0ea;
      --sky: #ddeaf7;
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --gold-pale: #f5edda;
      --silver: #c0c8d8;
      --petal: #f0d6e0;
      --cream: #fdf8f0;
      --text-dark: #3a2f2f;
      --text-mid: #6b5b5b;
      --text-light: #9b8b8b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--text-dark);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(232,213,163,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(240,214,224,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(232,224,240,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      text-align: center;
      padding: 60px 20px 40px;
      z-index: 1;
    }

    .header-ornament {
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 400;
      color: var(--text-dark);
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    h1 span {
      background: linear-gradient(135deg, var(--gold) 0%, #e8c97a 40%, var(--gold) 70%, #b8901a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--text-mid);
      margin-top: 14px;
      letter-spacing: 0.06em;
    }

    .header-divider {
      width: 180px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 28px auto 0;
    }

    .header-divider::before {
      content: '✦';
      display: block;
      text-align: center;
      color: var(--gold);
      font-size: 0.85rem;
      margin-top: -10px;
      background: var(--cream);
      width: 24px;
      margin-left: auto;
      margin-right: auto;
    }

    .grid-section {
      position: relative;
      z-index: 1;
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px 30px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 32px;
    }

    .card {
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease;
      backdrop-filter: blur(6px);
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 50px rgba(201,168,76,0.18), 0 6px 16px rgba(0,0,0,0.06);
      border-color: rgba(201,168,76,0.5);
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 130%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--blush), var(--lavender));
    }

    .card-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img-wrap img { transform: scale(1.06); }

    .card-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--gold);
      font-size: 2.5rem;
    }

    .card-placeholder span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      color: var(--text-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card-body {
      padding: 18px 16px 20px;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.3;
    }

    .card-tag {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1)  { animation-delay: 0.05s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.15s; }
    .card:nth-child(4)  { animation-delay: 0.20s; }
    .card:nth-child(5)  { animation-delay: 0.25s; }
    .card:nth-child(6)  { animation-delay: 0.30s; }
    .card:nth-child(7)  { animation-delay: 0.35s; }
    .card:nth-child(8)  { animation-delay: 0.40s; }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px 20px 50px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--text-light);
      font-size: 1rem;
    }

    footer::before {
      content: '✦ ✦ ✦';
      display: block;
      color: var(--gold-light);
      font-style: normal;
      letter-spacing: 0.4em;
      margin-bottom: 14px;
      font-size: 0.75rem;
    }

    @media (max-width: 600px) {
      .grid { gap: 20px; grid-template-columns: repeat(2, 1fr); }
      header { padding: 40px 16px 28px; }
    }
  </style>
</head>
<body>

<header>

  <h1>The magic Jen Jen left behind in <span>every oracle deck</span></h1>

  <div class="header-divider"></div>

<section class="grid-section">

<footer>

  const placeholderColors = [
    ['#f7e8e8','#e8d5a3'], ['#e8e0f0','#c0c8d8'], ['#dff0ea','#c9a84c'],
    ['#ddeaf7','#e8d5a3'], ['#f0d6e0','#c9a84c'], ['#fdf0e8','#c0c8d8'],

  const emojis = ['🌙','🌸','✨','🔮','🌿','💫','🌟','🦋'];
  const grid = document.getElementById('deckGrid');

  decks.forEach((deck, i) => {
    const colors = placeholderColors[i % placeholderColors.length];
    const emoji  = emojis[i % emojis.length];
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `product.html?deck=${deck.slug}`;
    const imgContent = deck.image
      ? `<img src="${deck.image}" alt="${deck.title}" loading="lazy" />`

      <div class="card-img-wrap">${imgContent}</div>
      <div class="card-body">
        <div class="card-title">${deck.title}</div>
        <div class="card-tag">${deck.tag}</div>
      </div>`;
    grid.appendChild(a);
  });
